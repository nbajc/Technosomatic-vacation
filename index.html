<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f2efe5">
<title>Venice · Istria · Kornati — Art &amp; Sea 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,300;1,500;1,600&family=Outfit:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2efe5;
  --bg2:#ece7d8;
  --bg3:#e5dfcd;
  --paper:#faf8f1;
  --text:#1c1a13;
  --muted:#6a6253;
  --subtle:#a39a83;
  --accent:#b5612a;
  --accent2:#a8842f;
  --chartreuse:#83851f;
  --blue:#2f6470;
  --blue2:#3a7a88;
  --ink:#1c1a13;
  --border:rgba(28,26,19,0.13);
  --border2:rgba(28,26,19,0.26);
  --ff-display:'Cormorant Garamond',Georgia,serif;
  --ff-body:'Outfit',sans-serif;
  --ff-mono:'IBM Plex Mono',monospace;
}
html{scroll-behavior:smooth;font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--ff-body);font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:.7rem 2.5rem;background:rgba(242,239,229,0.9);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border)}
.nav-brand{display:flex;align-items:center;gap:.7rem}
.nav-logo{height:30px;width:auto;mix-blend-mode:multiply}
.nav-title{font-family:var(--ff-display);font-style:italic;font-size:1rem;letter-spacing:.02em;color:var(--text)}
.nav-links{display:flex;gap:2rem;font-family:var(--ff-mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.nav-links a{transition:color .2s}
.nav-links a:hover{color:var(--accent)}

/* HERO */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:7rem 2.5rem 5rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(165deg,#f4f1e8 0%,#ece4d2 45%,#e9e6d8 72%,#f2efe5 100%);z-index:0}
.hero-noise{position:absolute;inset:0;opacity:.5;mix-blend-mode:multiply;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");background-size:200px;z-index:1}
.hero-content{position:relative;z-index:2;max-width:1000px;margin:0 auto;width:100%}
.hero-logo{width:min(420px,80vw);height:auto;mix-blend-mode:multiply;margin-bottom:2.5rem}
.hero-sys{font-family:var(--ff-mono);font-size:.68rem;letter-spacing:.06em;color:var(--muted);margin-bottom:2rem;display:grid;gap:.25rem;border-left:2px solid var(--accent);padding-left:1rem}
.hero-sys b{color:var(--text);font-weight:500}
.hero-title{font-family:var(--ff-display);font-size:clamp(3.5rem,8.5vw,7.5rem);font-weight:300;line-height:.98;font-style:italic;color:var(--text);margin-bottom:2rem}
.hero-title em{font-style:normal;color:var(--accent)}
.hero-subtitle{font-family:var(--ff-mono);font-size:.74rem;letter-spacing:.04em;color:var(--muted);display:flex;gap:1.6rem;flex-wrap:wrap}
.hero-subtitle span::before{content:'/  ';color:var(--accent)}

/* PHASE STRIP */
.phase-strip{display:grid;grid-template-columns:1fr 1fr;border-top:0.5px solid var(--border2);border-bottom:0.5px solid var(--border2);background:var(--paper)}
.phase-card{padding:2.5rem 2.5rem;border-right:0.5px solid var(--border)}
.phase-card:last-child{border-right:none}
.phase-tag{font-family:var(--ff-mono);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:.75rem}
.phase-tag.venice{color:var(--accent)}
.phase-tag.adriatic{color:var(--blue)}
.phase-name{font-family:var(--ff-display);font-size:1.9rem;font-weight:300;font-style:italic;margin-bottom:.5rem}
.phase-meta{font-size:.82rem;color:var(--muted);line-height:1.65}

/* SECTION */
section{padding:5rem 2.5rem}
.section-eyebrow{font-family:var(--ff-mono);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:1rem}
.section-eyebrow span{display:block;height:1px;width:36px;background:currentColor;opacity:.5}
.section-title{font-family:var(--ff-display);font-size:clamp(2rem,4vw,3.2rem);font-weight:300;font-style:italic;margin-bottom:.5rem;color:var(--text)}
.section-intro{font-size:.92rem;color:var(--muted);max-width:680px;line-height:1.8;margin-bottom:3rem}

/* SPOTLIGHT */
.spotlight{background:var(--paper);border:0.5px solid var(--border2);padding:2.5rem;margin-bottom:2.5rem;display:grid;grid-template-columns:2fr 3fr;gap:2.5rem;align-items:center}
.spotlight-label{font-family:var(--ff-mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:.75rem}
.spotlight-name{font-family:var(--ff-display);font-size:2.1rem;font-weight:300;font-style:italic;margin-bottom:.4rem}
.spotlight-show{font-size:.84rem;color:var(--muted);margin-bottom:1.2rem}
.spotlight-body{font-size:.86rem;line-height:1.85;color:var(--text)}
.spotlight-body em{font-style:italic;color:var(--accent)}
.spotlight-link{display:inline-flex;align-items:center;gap:.4rem;margin-top:1.2rem;font-family:var(--ff-mono);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);border-bottom:0.5px solid var(--accent);padding-bottom:3px;transition:opacity .2s}
.spotlight-link:hover{opacity:.6}
.spotlight-divider{width:1px;background:var(--border2);align-self:stretch}
.spotlight-detail{font-size:.83rem;line-height:1.9;color:var(--muted)}
.spotlight-detail strong{color:var(--text);font-weight:500}
.spotlight-detail em{font-style:italic}

/* DAYS */
.days-grid{display:flex;flex-direction:column;gap:.6rem;margin-bottom:3.5rem}
.day{display:grid;grid-template-columns:74px 1fr;background:var(--paper);border:0.5px solid var(--border);transition:border-color .2s}
.day:hover{border-color:var(--border2)}
.day-num{padding:1.2rem 1rem;border-right:0.5px solid var(--border);text-align:center}
.day-num .dn{font-family:var(--ff-display);font-size:1.6rem;font-weight:300;font-style:italic;color:var(--accent);line-height:1}
.day-num .dd{font-family:var(--ff-mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--subtle);margin-top:.3rem}
.day-body{padding:1.2rem 1.5rem}
.day-city{font-size:.98rem;font-weight:500;color:var(--text);margin-bottom:.3rem}
.day-desc{font-size:.83rem;color:var(--muted);line-height:1.75;margin-bottom:.6rem}
.day-desc em{font-style:italic;color:var(--text)}
.tags{display:flex;flex-wrap:wrap;gap:.35rem}
.tag{font-family:var(--ff-mono);font-size:.58rem;letter-spacing:.03em;padding:.28rem .6rem;border:0.5px solid var(--border2);color:var(--muted)}
.tag.art{border-color:rgba(181,97,42,.4);color:var(--accent)}
.tag
